name: Create and publish container images

on:
  push:
    branches: ['main']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    strategy:
      matrix:
        image:
          - tag: omp-debian
            dockerfile: pi/oh-my-pi-debian.Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up Docker QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker BuildKit
        id: buildkit
        uses: docker/setup-buildx-action@v4
        with:
           platforms: linux/amd64,linux/arm64

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ matrix.image.tag }}-${{ github.ref_name }}

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          builder: ${{ steps.buildkit.outputs.name }}
          platforms: ${{ steps.buildkit.outputs.platforms }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          sbom: true

      - name: Generate Docker image artifact attestation
        uses: actions/attest@v4
        if: ${{ github.event_name != 'pull_request' }}
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true